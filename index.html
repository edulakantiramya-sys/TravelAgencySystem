<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Agency</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        body {
            background-image: url('https://www.smartertravel.com/wp-content/uploads/2020/03/ST_ZoomBackground_Beach03.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            min-height: 100vh;
        }
        .home .right ul li a {
            cursor: pointer;
        }
        @media (min-width: 360px) {
            .home .one {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }
            .home .one li {
                text-align: center;
                padding: 0.3rem;
                list-style: none;
                font-weight: 600;
                font-size: x-large;
            }
            .home .one li a {
                text-decoration: none;
                color: black;
            }
            .home .main .top .vehicle,
            .searchvehicles .bottom .vehicles,
            .availableBuses .bottom .vehicles {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: column;
                margin: 1rem;
            }
            .home .main .top .vehicle img {
                height: 100px;
                width: 100px;
                border-radius: 20px;
                object-fit: cover;
            }
            .home .main .top .vehicle .v1 {
                border: 10px solid red;
            }
            .home .main .top .vehicle .v2 {
                border: 10px solid green;
            }
            .home .main .top .vehicle .v3 {
                border: 10px solid rgb(255, 100, 0);
            }
            .home .main .bottom {
                text-align: center;
            }
            .home .main .bottom h1,
            .home .main .bottom h3 {
                font-size: 4rem;
                font-weight: 900;
                margin: 1rem;
            }
            .home .main .bottom h3 {
                font-size: 2rem;
            }
        }
        @media (min-width: 600px) {
            .home .one {
                margin-top: 1rem;
            }
            .home .left ul li,
            .home .right ul li {
                margin: 0.5rem;
            }
            .home .main .top {
                display: flex;
                justify-content: center;
                align-items: center;
                flex-direction: row;
                margin: 1rem;
                margin-top: 2rem;
            }
            .home .main .bottom h1 {
                margin-top: 3rem;
            }
        }
        @media (min-width: 700px) {
            .home .one {
                display: grid;
                grid-template-columns: 25% 75%;
            }
            .home .one .right ul {
                display: grid;
                grid-template-columns: 33% 34% 33%;
            }
        }
    </style>
    <script>
        function goAbout(event) {
            event.preventDefault();
            window.location.href = 'about.html';
        }
        function goContact(event) {
            event.preventDefault();
            window.location.href = 'contactus.html';
        }
        function goLogin(event) {
            event.preventDefault();
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <main>
        <section class="home">
            <div class="one">
                <div class="left">
                    <ul>
                        <li>Travel Agency</li>
                    </ul>
                    <img src="logo2.jpeg.jpg" alt="Logo" style="margin-top:0.5rem;width:80px;height:auto;border-radius:8px;">
                </div>
                <div class="right">
                    <ul>
                        <li><a href="about.html" onclick="goAbout(event)">About</a></li>
                        <li><a href="contactus.html" onclick="goContact(event)">Contact Us</a></li>
                        <li><a href="login.html" onclick="goLogin(event)">Log In</a></li>
                    </ul>
                </div>
            </div>
            <div class="main">
                <div class="top">
                    <div class="vehicle">
                        <img src="https://images.pexels.com/photos/112460/pexels-photo-112460.jpeg" alt="Car" class="v1">
                    </div>
                    <div class="vehicle v2">
                        <img src="https://images.pexels.com/photos/1571779/pexels-photo-1571779.jpeg" alt="Bus" class="v2">
                    </div>
                    <div class="vehicle v3">
                        <img src="https://images.pexels.com/photos/730778/pexels-photo-730778.jpeg" alt="Train" class="v3">
                    </div>
                </div>
                <div class="bottom">
                    <h1>TRAVEL AGENCY</h1>
                    <h3><i>Smooth &amp; Safe Journey</i></h3>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
